services:
  - type: web
    name: apps-api
    env: node
    plan: free
    buildCommand: npm run build --workspace=apps/api
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: PORT
        value: 3001
      - key: S3_BUCKET
        value: rendernodock-storage-052080186671-us-east-1-an
      - key: AWS_ACCESS_KEY_ID
        value: AKIAQYIBYSUXZOMQRJPW
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: PUBLIC_BASE_URL
        value: https://onrender.com
      - key: MODAL_AUDIO_URL
        value: https://modal.run
      - key: MODAL_IMAGE_URL
        value: https://modal.run
      - key: MODAL_LIPSYNC_URL
        value: https://modal.run
      - key: MODAL_LTX_URL
        value: https://modal.run
      - key: FAL_API_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false