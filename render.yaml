services:
  - type: web
    name: rendernodock
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: WEB_DIST_DIR
        value: apps/web/dist
      - key: PUBLIC_BASE_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: STORAGE_BACKEND
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: MODAL_AUDIO_URL
        sync: false
      - key: MODAL_LTX_URL
        sync: false
